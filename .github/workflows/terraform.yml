name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write      # required for Azure OIDC login
  pull-requests: write # required to comment the plan on PRs

env:
  TF_IN_AUTOMATION: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Static checks that need no cloud credentials.
  # ---------------------------------------------------------------------------
  validate:
    name: Format, validate & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive --format compact

  # ---------------------------------------------------------------------------
  # Security / misconfiguration scanning.
  # ---------------------------------------------------------------------------
  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          skip-dirs: "**/.terraform"

  # ---------------------------------------------------------------------------
  # Plan against Azure. Requires the secrets below to be configured.
  # Authenticates with OIDC (workload identity federation) - no stored secret.
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.event_name == 'pull_request'
    environment: dev
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      # Upload the plan so the apply job (not shown) can consume the reviewed
      # artifact instead of re-planning - prevents local/CI drift.
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 5
