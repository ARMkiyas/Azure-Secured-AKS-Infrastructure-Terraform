name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege by default. Jobs that need more request it explicitly.
permissions:
  contents: read

# Cancel superseded runs on the same ref to limit exposure window and cost.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Static checks that need no cloud credentials.
  # ---------------------------------------------------------------------------
  validate:
    name: Format, validate & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: "v0.63.1"

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive --format compact
        env:
          # Authenticated plugin downloads avoid anonymous rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Security / misconfiguration scanning.
  # ---------------------------------------------------------------------------
  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Trivy config scan
        # All third-party actions are pinned to a commit SHA (not a tag).
        # Tags are mutable; the March 2026 trivy-action incident force-pushed
        # version tags to malware. A SHA cannot be repointed.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          version: v0.71.0 # Trivy binary version (action stays SHA-pinned)
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          skip-dirs: "**/.terraform"

  # ---------------------------------------------------------------------------
  # Plan against Azure. Requires the secrets below to be configured.
  # Authenticates with OIDC (workload identity federation) - no stored secret.
  #
  # SECURITY: `terraform plan` can execute code (external data sources, provider
  # and module fetches). Running it on pull_request with cloud access is a
  # "pwn request" risk. The `dev` environment MUST be configured with required
  # reviewers in repo settings so the OIDC token is only issued after a human
  # approves the run for that PR. Forked-PR runs do not receive secrets/OIDC.
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    environment: dev
    permissions:
      contents: read
      id-token: write # Azure OIDC login only
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.5"

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -input=false -lock-timeout=300s -out=tfplan

      # Upload the plan so a downstream apply job consumes the reviewed artifact
      # instead of re-planning - prevents local/CI drift.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan
          path: tfplan
          retention-days: 5
